name: Deploy Reporter Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build image & update Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-hdw-notify-${{ github.run_id }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.AWS_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.AWS_ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Lambda function code
        # update-function-configuration と update-function-code は同時実行できない
        # ため逐次実行する。コードを先にデプロイすることで、env 側で削除した変数を
        # 旧コードが読みに行って KeyError を踏むリスクを避ける (新コードは古い env
        # キーを参照しないため、新コード + 旧 env の組合せは安全)。
        env:
          FUNCTION_NAME: ${{ vars.AWS_LAMBDA_FUNCTION_NAME }}
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/${{ vars.AWS_ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          set -euo pipefail
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --image-uri "$IMAGE_URI" \
            --publish \
            --output json > update.json
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          jq -r '"Deployed version: \(.Version)\nImage: \(.ImageUri // .Code.ImageUri)"' update.json

      - name: Sync runtime config to Lambda environment variables
        # 非機密 AWS 構成は deploy/config.yml から、機密 (Webhook URL / ExternalId)
        # は GHA Secret から取得して Lambda 環境変数へ投入する。Lambda は起動時に
        # os.environ から読むため、値変更時は対応する YAML / GHA Secret を更新して
        # 再実行すれば反映される（コード再ビルドは不要）。
        # AlarmName → log group のマップは config/alarm_log_groups.yml に分離 (image
        # 同梱で起動時に PyYAML で読まれる) ため、ここでは env vars に投入しない。
        # ubuntu-latest runner には yq (mikefarah/yq v4) と jq がプリインストール済み。
        env:
          FUNCTION_NAME: ${{ vars.AWS_LAMBDA_FUNCTION_NAME }}
          CONFIG_FILE: deploy/config.yml
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AWS_SES_FROM_ADDRESS: ${{ secrets.AWS_SES_FROM_ADDRESS }}
        run: |
          set -euo pipefail

          : "${DISCORD_WEBHOOK_URL:?secret DISCORD_WEBHOOK_URL is required}"
          : "${AWS_SES_FROM_ADDRESS:?secret AWS_SES_FROM_ADDRESS is required}"
          test -f "$CONFIG_FILE" || { echo "config file not found: $CONFIG_FILE" >&2; exit 1; }

          echo "Source config: $CONFIG_FILE"

          # YAML を JSON 化（yq の Go 実装。値の型は維持される）
          CONFIG_JSON=$(yq -o=json eval . "$CONFIG_FILE")

          # config キー (aws_*) → Lambda 環境変数名にマップ。数値は tostring で文字列化
          # （Lambda 環境変数値はすべて文字列のため）。
          ENV_JSON=$(jq -n \
            --argjson c "$CONFIG_JSON" \
            --arg DISCORD_WEBHOOK_URL "$DISCORD_WEBHOOK_URL" \
            --arg AWS_SES_FROM_ADDRESS "$AWS_SES_FROM_ADDRESS" \
            '{Variables: {
              DISCORD_WEBHOOK_URL: $DISCORD_WEBHOOK_URL,
              AWS_SES_FROM_ADDRESS: $AWS_SES_FROM_ADDRESS,
              ENVIRONMENT_NAME: ($c.environment_name | tostring),
              TARGET_FUNCTION_NAME: ($c.target_function_name | tostring),
              CROSS_ACCOUNT_ROLE_ARN: ($c.aws_cross_account_role_arn | tostring),
              CLOUDWATCH_LOGS_QUERY_POLL_INTERVAL_SEC: ($c.aws_cloudwatch_logs_query_poll_interval_sec | tostring),
              BEDROCK_MODEL_ID: ($c.aws_bedrock_model_id | tostring),
              BEDROCK_MAX_TOKENS: ($c.aws_bedrock_max_tokens | tostring),
              BEDROCK_TEMPERATURE: ($c.aws_bedrock_temperature | tostring),
              PYTHONIOENCODING: ($c.python_io_encoding | tostring),
            }}')

          # 必須キーが YAML に存在するか検証（jq の null チェック）
          MISSING=$(echo "$ENV_JSON" | jq -r '.Variables | to_entries | map(select(.value == "null" or .value == "")) | map(.key) | join(",")')
          if [ -n "$MISSING" ]; then
            echo "missing required keys in $CONFIG_FILE: $MISSING" >&2
            exit 1
          fi

          echo "Updating Lambda environment variables..."
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --environment "$ENV_JSON" \
            --output json > /dev/null
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          echo "Environment variables updated."
