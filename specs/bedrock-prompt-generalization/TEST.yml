      importance: 中
      title: "fallback 種別の文字列が衝突しない"
      reason: |
        識別子が衝突すると運用者が「どこで失敗したか」を切り分けられない。
      code: |
        def test_fallback_kinds_are_distinguishable():
            \"\"\"fallback_kind 文字列が衝突しないこと。\"\"\"
            # main.py で使われる識別子集合
