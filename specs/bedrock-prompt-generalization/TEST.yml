      reason: |
        -test 統合不変条件の E2E 検証。横断テスト (TC-NORM-1〜3) が個別レイヤ
        で動いても、main フロー全体で破綻しないこと。
      code: |
        def test_test_alarm_uses_same_resources_as_prod(...):
            \"\"\"hdw-sakura-test を投げて、prod 用の config / webhook が
            使われること。
            検証ポイント:
              - load_config が hdw-sakura.yaml を引いていること
              - profile.signal の completion_success が解決されていること
              - DISCORD_WEBHOOK_URLS の "hdw-sakura" キーから URL が引かれていること
              - Discord embed の author が "HDW Notify · test" (derive_env_label)
            \"\"\"
            # TC-E2E-1 と同じ fixture で alarm_name="hdw-sakura-test" を投入
            # mock_post.call_args から embed を取り出し、author が "test" 付き

  # ============================================================
  # 省略するテスト (記録)
  # ============================================================
  # PLAN の実装で自明か、上記テストで間接的にカバーされるため省略:
  #
  #   - Config dataclass のフィールド名が YAML キーと 1:1
  #     → load_config 実装で機械的に行うため自明
  #   - normalize_alarm_name("foo") が "foo" を返す
  #     → 恒等変換の自明動作。TC-NORM で "-test" 含むケースのみ検証
  #   - build_insights_query が空でない文字列を返す
  #     → 実装で自明。空 input_identifiers エラーケースのみ間接検証
  #   - Insights クエリ文字列の細部 (fields 句の順序等)
  #     → スコープ外 (REQ-006 description)
  #   - Discord embed の各 field の細部
  #     → TASK-010 で機械的に組み立てるため自明。TC-E2E で投稿発火のみ検証
  #   - derive_env_label の単独 unit test
  #     → TC-E2E-2 の embed author 表記検証で間接的にカバー
  #   - extract_ignored_signals の単独 unit test
  #     → profile fixture を渡せば自明な filter。TC-E2E で間接検証
  #   - 各 enum 値の個別検証 (type / mechanism / severity)
  #     → 1 つの enum 違反テスト (TC-002-5) で代表
  #   - 各 REQ ごとの AC を 1:1 で TC 化
  #     → 整合性制約 7 項目のうち重要なもの (TC-002-1〜5) を選択

  test_execution_strategy:
    ci_on_pr:
      cases: [TC-002, TC-NORM, TC-CLEANUP, TC-PROMPT, TC-SEV, TC-NORMRESP, TC-WEBHOOK]
      type_filter: [unit, static]
      frequency: PR 毎
    ci_on_merge:
      cases: [上記 + TC-FALLBACK, TC-E2E]
      type_filter: [unit, static, integration]
      frequency: merge 毎
    manual_e2e:
      note: |
        実 AWS リソースでの cross-account 動作確認は cross-account-architecture
        REQ-006 / REQ-007 が既に定義しているため本 TEST では省略。
      frequency: デプロイ時 / 障害切り分け時
