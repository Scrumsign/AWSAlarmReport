      title: "Bedrock 応答の正規化 + severity 補正を実装する"
      description: |
        src/utils/response.py を新設:

          ```python
          # src/utils/response.py
          from __future__ import annotations
          import json
          from typing import Any


          _VALID_VERDICTS = ("healthy", "failed", "absent")
          _VALID_SEVERITIES = ("HIGH", "MEDIUM", "LOW")
          _VALID_CONFIDENCES = ("high", "medium", "low")
          _VALID_PHASES = ("即時対応", "調査手順", "恒久対策")

          _MAX_SUMMARY_CHARS = 80
          _MAX_DETAIL_CHARS = 300
          _MAX_ACTION_TEXT_CHARS = 80

          _SEVERITY_ORDER = {"LOW": 0, "MEDIUM": 1, "HIGH": 2}


          def normalize_bedrock_response(text: str) -> dict[str, Any]:
              \"\"\"Bedrock 応答テキストを JSON パース + スキーマ整形する。

              欠落キー・enum 外値・字数超過は安全側に丸める (通知欠落させない)。
              \"\"\"
              try:
                  data = json.loads(text)
              except json.JSONDecodeError:
                  data = {}
              if not isinstance(data, dict):
                  data = {}

              verdict = data.get("verdict")
              if verdict not in _VALID_VERDICTS:
                  verdict = "absent"  # 安全側既定

              severity = (str(data.get("severity") or "")).upper()
              if severity not in _VALID_SEVERITIES:
                  severity = "MEDIUM"

              confidence = (str(data.get("confidence") or "")).lower()
              if confidence not in _VALID_CONFIDENCES:
                  confidence = "low"

              summary = str(data.get("summary") or "(要約取得失敗)")
              summary = summary[:_MAX_SUMMARY_CHARS]

              detail = str(data.get("detail") or "(詳細取得失敗)")
              detail = detail[:_MAX_DETAIL_CHARS]

              raw_actions = data.get("actions") or []
              actions: list[dict[str, str]] = []
              if isinstance(raw_actions, list):
                  for item in raw_actions:
                      if not isinstance(item, dict):
                          continue
                      phase = item.get("phase")
                      if phase not in _VALID_PHASES:
                          continue
                      text_value = str(item.get("text") or "")[:_MAX_ACTION_TEXT_CHARS]
                      if not text_value:
                          continue
                      actions.append({"phase": phase, "text": text_value})

              return {
                  "verdict": verdict,
                  "severity": severity,
                  "confidence": confidence,
                  "summary": summary,
                  "detail": detail,
                  "actions": actions,
              }


          def apply_severity_policy(
              response: dict[str, Any], signal_kind: dict[str, Any]
          ) -> dict[str, Any]:
              \"\"\"signal_kind 由来の severity ポリシーで応答を補正する。

              - verdict=healthy: max_severity_on_success で clamp
              - verdict=absent : severity_on_absence で上書き、confidence=low
              - verdict=failed : 補正なし (HIGH のまま)
              \"\"\"
              verdict = response["verdict"]
              if verdict == "healthy":
                  ceiling = signal_kind.get("max_severity_on_success", "MEDIUM")
                  response["severity"] = _clamp_severity(
                      response["severity"], ceiling
                  )
              elif verdict == "absent":
                  response["severity"] = signal_kind.get(
                      "severity_on_absence", "MEDIUM"
                  )
                  response["confidence"] = "low"
              # failed: no-op
              return response


          def _clamp_severity(value: str, ceiling: str) -> str:
              v_rank = _SEVERITY_ORDER.get(value, 1)
              c_rank = _SEVERITY_ORDER.get(ceiling, 1)
              if v_rank <= c_rank:
                  return value
              # ceiling 以下に丸める
              return ceiling
          ```

