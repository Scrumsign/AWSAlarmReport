        5. GitHub Actions secrets の DISCORD_WEBHOOK_URLS (JSON) に
           "<正規化 alarm 名>": "<webhook URL>" を追加。

        6. Reporter Lambda を再ビルド・再デプロイ
           - configs/ 同梱と env var 更新の反映

        ## 新クライアント追加時の追加手順

        2. クライアント S3 に <PROFILE_FILE> を手動配置:

           ```bash
           aws s3 cp profile.yaml \\
             s3://<client-bucket>/<CONTEXT_PREFIX>/<PROFILE_FILE> \\
             --profile <client-profile>
           ```

        3. クライアント側 AssumeRole 対象 Role に追加:

           ```json
           {
             "Effect": "Allow",
             "Action": ["s3:GetObject"],
             "Resource":
               "arn:aws:s3:::<client-bucket>/<CONTEXT_PREFIX>/*"
           },
           {
             "Effect": "Allow",
             "Action": ["s3:ListBucket"],
             "Resource": "arn:aws:s3:::<client-bucket>",
             "Condition": {
               "StringLike": { "s3:prefix": "<CONTEXT_PREFIX>/*" }
             }
           }
           ```

        4. バケット KMS CMK 暗号化時のみ。CMK 側に cross-account
           kms:Decrypt grant を追加。

        ## 既存クライアントの新アラーム追加時

        手順 2〜4 をスキップ (既存 IAM / S3 / KMS を流用)。

        ## 不変条件 (両ケース共通)

        - 運用 Lambda のコード・実行 IAM Role・CI/CD パイプライン定義に
          変更を加えない (REQ-003 AC-003-2)
        - 手順 1 / 5 / 6 は自社側作業、手順 2 / 3 / 4 はクライアント側作業

        ## 失敗モード (片方欠落時)

        - 手順 1 欠落 → load_config() が ConfigNotFoundError →
          REQ-008 (a) フォールバック
        - 手順 5 欠落 → resolve_webhook_url() が None → CloudWatch Logs に
          warning 記録のみ (REQ-016 AC-016-3)
