plan:
  spec:
    id: "cross-account-architecture"
    version: "3.4.0"
  rev: 6
  created_at: "2026-05-21"

  tasks:
    - id: "TASK-001"
      req: "REQ-002"
      title: "クライアントアカウントに SNS Topic を作成し Topic Policy を設定する"
      description: |
        クライアントアカウント (920373030024) で CloudWatch Alarm 用 SNS Topic を作成し、
        Topic Policy で以下を許可する:
          - cloudwatch.amazonaws.com の SNS:Publish (同一アカウント内 Alarm のみ)
          - arn:aws:iam::088898720463:root の SNS:Subscribe / SNS:Receive

        作成コマンド:
          aws sns create-topic --name hdw-ml-alarm-topic \
            --profile hanshin-t.kimura --region ap-northeast-1

        Topic Policy (set-topic-attributes で適用):
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowCloudWatchPublish",
                "Effect": "Allow",
                "Principal": { "Service": "cloudwatch.amazonaws.com" },
                "Action": "SNS:Publish",
                "Resource": "arn:aws:sns:ap-northeast-1:920373030024:hdw-ml-alarm-topic",
                "Condition": {
                  "ArnLike": {
                    "aws:SourceArn": "arn:aws:cloudwatch:ap-northeast-1:920373030024:alarm:*"
                  },
                  "StringEquals": {
                    "aws:SourceAccount": "920373030024"
                  }
                }
              },
              {
                "Sid": "AllowCrossAccountSubscribe",
                "Effect": "Allow",
                "Principal": { "AWS": "arn:aws:iam::088898720463:root" },
                "Action": ["SNS:Subscribe", "SNS:Receive"],
                "Resource": "arn:aws:sns:ap-northeast-1:920373030024:hdw-ml-alarm-topic"
              }
            ]
          }

        confused-deputy 対策の根拠:
          AWS 公式 (CloudWatch Notify_Users_Alarm_Changes / SNS_Confused_Deputy) は
          "most effective way to protect against the confused deputy problem is to
          use the aws:SourceArn global condition context key with the full ARN of
          the resource" としており、aws:SourceArn (ワイルドカード可) と
          aws:SourceAccount の併用が推奨パターン。

    - id: "TASK-002"
      req: "REQ-003"
      title: "クライアントアカウントに HDWNotifyLogReader IAM Role を作成する"
      description: |
        クライアントアカウント (920373030024) で IAM Role HDWNotifyLogReader を作成する。

        Trust Policy:
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::088898720463:role/hdw-notify-execution-role"
              },
              "Action": "sts:AssumeRole"
            }]
          }

        ExternalId は採用しない (SPEC REQ-003 description 参照)。
        本構成では Principal を hdw-notify-execution-role に完全限定することで
        自社アカウント内の任意 principal による引き受けを排除しており、
        ExternalId は独立した security layer として機能しない。

        Permission Policy (inline):
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": [
                "logs:DescribeLogGroups",
                "logs:DescribeLogStreams",
                "logs:FilterLogEvents",
                "logs:GetLogEvents",
                "logs:StartQuery",
                "logs:GetQueryResults",
                "logs:StopQuery"
              ],
              "Resource": "*"
            }]
          }

    - id: "TASK-003"
      req: "REQ-001, REQ-003"
      title: "自社 Lambda 実行ロールに sts:AssumeRole を追加する"
      description: |
        既存 hdw-notify-execution-role (088898720463) に inline policy を追加する。

        Policy:
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": "sts:AssumeRole",
              "Resource": "arn:aws:iam::920373030024:role/HDWNotifyLogReader"
            }]
          }

        他クライアント追加時は Resource を増やす。
        現在の inline policy (hdw-notify-permissions) からは
        logs:StartQuery / GetQueryResults / StopQuery の権限を削除して構わない
        (これらはクライアント側 Role で実行されるため、自社ロールには不要)。
        ただし Lambda 自身の実行ログ書き出し用に
        CloudWatch Logs:CreateLogGroup / CreateLogStream / PutLogEvents は残すこと。

    - id: "TASK-004"
      req: "REQ-002, REQ-004, REQ-005"
      title: "src/main.py を SNS イベント + AssumeRole 対応に改修する"
      description: |
        変更箇所:

        1. Env dataclass (現 L72-105) を以下に変更:
             - cloudwatch_logs_group を削除
             - 追加: cross_account_role_arn: str
             - 追加: log_group_map: dict[str, str]  (json.loads(os.environ["LOG_GROUP_MAP"]))

        2. main() のイベントパース (現 L233-236) を SNS event 形式に変更:
             msg = json.loads(event["Records"][0]["Sns"]["Message"])
             alarm_name   = msg["AlarmName"]
             client_acct  = msg["AWSAccountId"]
             region       = msg.get("Region", os.environ.get("AWS_REGION", "ap-northeast-1"))
             timestamp    = msg["StateChangeTime"]
             reason       = msg.get("NewStateReason", "")

           AlarmName は SNS Message の AlarmName を使う (現状の event["alarmArn"].split(":")[-1]
           と異なる経路だが、結果は alarm 名と同じ)。

        3. 時間窓導出 (現 L238-241) を REQ-005 に合わせる:
             - 既存の cloudwatch_logs_window_before_min / _after_min env var を流用
               (config YAML の値を 30 / 5 に変更)
             - datetime.fromisoformat(timestamp.replace("Z", "+00:00")) で TZ 保持
               (既存実装と同じ)

        4. ロググループ解決:
             log_group = env.log_group_map.get(alarm_name)
             if not log_group:
                 logger.warning("no log group mapped", extra={"alarm_name": alarm_name})
                 _post_minimal_embed(
                     webhook_url=env.discord_webhook_url,
                     alarm_name=alarm_name,
                     timestamp=timestamp,
                     reason=reason,
                     rows_count=0,
                     extra_note="LOG_GROUP_MAP に該当アラームの登録がありません",
                     color=0xF1C40F,
                 )
                 return {"ok": True, "alarm": alarm_name, "skipped": "no_log_group_mapped"}

        5. AssumeRole 呼び出しを Logs Insights 直前 (現 L246) に挿入:
             try:
                 sts_response = boto3.client("sts").assume_role(
                     RoleArn=env.cross_account_role_arn,
                     RoleSessionName=f"hdw-notify-{_context.aws_request_id}",
                     DurationSeconds=900,
                 )
                 creds = sts_response["Credentials"]
                 logger.info("assumed cross-account role",
                             extra={"assumed_role_arn": sts_response["AssumedRoleUser"]["Arn"]})
             except (BotoCoreError, ClientError) as e:
                 logger.exception("assume_role failed; posting minimal fallback embed")
                 _post_minimal_embed(
                     webhook_url=env.discord_webhook_url,
                     alarm_name=alarm_name,
                     timestamp=timestamp,
                     reason=reason,
                     rows_count=0,
                     extra_note=f"クライアントログ取得用 AssumeRole 失敗: {type(e).__name__}",
                     color=0xE74C3C,
                 )
                 return {"ok": True, "alarm": alarm_name, "fallback": "assume_role_failed"}

             logs_client = boto3.client(
                 "logs",
                 region_name=region,
                 aws_access_key_id=creds["AccessKeyId"],
                 aws_secret_access_key=creds["SecretAccessKey"],
                 aws_session_token=creds["SessionToken"],
             )

        6. start_query 呼び出しで logGroupName を log_group に置き換える
           (env.cloudwatch_logs_group は削除)。

        7. _build_deeplinks_markdown も log_group を引数で受け取るよう変更
           (env.cloudwatch_logs_group の参照を削除)。

        Bedrock 呼び出し以降は変更不要 (Bedrock は自社アカウントの SDK call なので
        AssumeRole 不要)。

    - id: "TASK-005"
      req: "REQ-001, REQ-004"
      title: "deploy/config*.yml の env vars を更新する"
      description: |
        deploy/config.yml と deploy/config-prod.yml の双方を以下のように更新する:

        削除するキー:
          - aws_cloudwatch_logs_group (LOG_GROUP_MAP に統合)

        追加するキー (両環境共通):
          - aws_cross_account_role_arn: "arn:aws:iam::920373030024:role/HDWNotifyLogReader"
          - aws_log_group_map: |
              {"hdw-backend-processor-0001-errors":"/aws/lambda/HDW_Backend_Processor_0001"}
          (実際の AlarmName は CloudWatch コンソールで確認してから値を確定する)

        時間窓 (両環境):
          aws_cloudwatch_logs_window_before_min: 30  (既存維持)
          aws_cloudwatch_logs_window_after_min: 5    (現 0 → 5 に変更)

        ExternalId 関連の env key (EXTERNAL_ID) は SPEC v3.4.0 で不採用となったため
        config YAML に追加しない。既存環境で EXTERNAL_ID が Lambda に残っている場合は
        TASK-011 (ops 片付け) で除去する。

    - id: "TASK-006"
      req: "REQ-001, REQ-003"
      title: ".github/workflows/deploy.yml の env キーマッピングを更新する"
      description: |
        Sync runtime config to Lambda environment variables step (現 L56-113) を更新:

        jq -n の Variables: ブロックで:
          - CLOUDWATCH_LOGS_GROUP を削除
          - 追加:
              CROSS_ACCOUNT_ROLE_ARN: ($c.aws_cross_account_role_arn | tostring),
              LOG_GROUP_MAP: ($c.aws_log_group_map | tostring),

        EXTERNAL_ID 投入は SPEC v3.4.0 で不採用となったため deploy.yml に追加しない。
        既存 deploy.yml に EXTERNAL_ID env / jq Variables / 必須チェックが残っている
        場合は本 TASK で同時に除去する。

        GitHub Secret EXTERNAL_ID_HANSHIN の新規登録は不要。既存登録がある場合は
        TASK-011 (ops 片付け) で削除する。

    - id: "TASK-007"
      req: "REQ-001, REQ-002"
      title: "自社 Lambda を SNS Topic に subscribe し、resource policy を整える"
      description: |
        自社アカウント (088898720463) 側で実施する。

        1. Lambda resource-based policy で SNS からの invoke を許可:
             aws lambda add-permission \
               --function-name HDW_Lambda_Notifier_0001 \
               --statement-id sns-hanshin-invoke \
               --action lambda:InvokeFunction \
               --principal sns.amazonaws.com \
               --source-arn arn:aws:sns:ap-northeast-1:920373030024:hdw-ml-alarm-topic \
               --profile hdw-test --region ap-northeast-1

        2. SNS Topic に自社 Lambda を subscribe:
             aws sns subscribe \
               --topic-arn arn:aws:sns:ap-northeast-1:920373030024:hdw-ml-alarm-topic \
               --protocol lambda \
               --notification-endpoint arn:aws:lambda:ap-northeast-1:088898720463:function:HDW_Lambda_Notifier_0001 \
               --profile hdw-test --region ap-northeast-1

           subscribe コマンドはクライアントアカウントの Topic に対する操作なので、
           ローカルの実行プロファイルは自社 (hdw-test) で良い (Topic Policy が
           088898720463:root の SNS:Subscribe を許可しているため成立)。

    - id: "TASK-008"
      req: "REQ-002"
      title: "クライアントアカウントに CloudWatch Alarm を新規作成し AlarmAction を SNS Topic に指定する"
      description: |
        クライアントアカウント (920373030024) で HDW_ML 監視用 CloudWatch Alarm を
        新規作成する。Alarm Action として TASK-001 で作成した SNS Topic を指定する。

        対象メトリクス: HDW_Backend_Processor_0001 (HDW_ML) の AWS/Lambda Errors。
        実際の threshold / evaluation period / metric statistic は docs/operations.md
        または monitoring 担当の方針に従って確定する。本 PLAN ではアラーム配線
        (Action と SNS Topic の紐付け) のみを規定する。

        作成コマンド例 (threshold / period 等は要確定):
          aws cloudwatch put-metric-alarm \
            --alarm-name hdw-backend-processor-0001-errors \
            --alarm-description "HDW_ML 失敗検知" \
            --metric-name Errors --namespace AWS/Lambda \
            --statistic Sum --period 300 --evaluation-periods 1 \
            --threshold 1 --comparison-operator GreaterThanOrEqualToThreshold \
            --dimensions Name=FunctionName,Value=HDW_Backend_Processor_0001 \
            --treat-missing-data notBreaching \
            --alarm-actions arn:aws:sns:ap-northeast-1:920373030024:hdw-ml-alarm-topic \
            --profile hanshin-t.kimura --region ap-northeast-1

        本 SPEC は HDW_Notify (受信側) の構築仕様であり、Alarm 自体の閾値・評価窓・
        運用ルールはスコープ外。Alarm のメトリクス選定が別途必要な場合は、その仕様を
        独立した SPEC として起こすこと。

        AlarmName は LOG_GROUP_MAP env var のキーと完全一致させる必要がある
        (TASK-005 / deploy/config*.yml の aws_log_group_map と整合)。

    - id: "TASK-009"
      req: "REQ-006"
      title: "E2E 検証手順を準備し docs/operations.md に追記する"
      description: |
        TASK-001〜008 のリソース構築と Lambda デプロイが完了した段階で、
        REQ-006 の E2E 検証 (TC-006-1/2/3) を実施するための前提と手順を整える。

        準備内容:

        1. クライアントアカウント (920373030024) にテスト用 Alarm を 1 つ用意。
           TASK-008 で作成する本番監視 Alarm (hdw-backend-processor-0001-errors) を
           そのまま流用してよい (set-alarm-state は実メトリクスの状態を問わず
           ALARM への手動遷移が可能)。

        2. LOG_GROUP_MAP env var の該当キーが、手動発火させる Alarm の AlarmName と
           完全一致していること、および値がクライアント側運用 Lambda の実在ロググループ
           (例: /aws/lambda/HDW_Backend_Processor_0001) を指していることを
           aws lambda get-function-configuration で再確認する。

        3. docs/operations.md (または同等の運用ドキュメント) に E2E 検証セクションを追記:
             - 発火手順 (aws cloudwatch set-alarm-state コマンド例)
             - 期待結果 (Discord embed 着弾 / Lambda 実行ログの assumed_role_arn /
               Logs Insights rows > 0 / Bedrock 正常終了)
             - 失敗時の切り分けポイント (TC-006-3 で見るフィールド)

        本 TASK は新規コードを書かない。既存実装と TASK-001〜008 で配線済みの AWS
        リソースのみで REQ-006 は満たせる前提のため、ドキュメント整備と試験ハーネス
        確認のみ。

    - id: "TASK-010"
      req: "REQ-007"
      title: "クロスアカウント Logs Insights 単独手動検証の手順を整備する"
      description: |
        Lambda 経由の E2E (TASK-009 / REQ-006) を回す前段として、Logs Insights 経路を
        単独で手動検証できる手順を整備する。本 TASK は AWS リソースの恒久変更を
        伴わない (検証完了後に元状態へ戻す) ことを前提とする。

        手順 (PowerShell 例 / 自社オペレータ端末で実施):

        1. HDWNotifyLogReader Trust Policy を一時的に拡張
           (推奨ルートは SPEC AC-007-1 (b) — 自社オペレータ IAM User/Role を直接追加。
            理由: Lambda 実行ロールへの BootStrap 前段でも検証できる)。

             # クライアントアカウント (920373030024) で実施
             # 自社オペレータの呼び出し元 ARN を取得:
             aws sts get-caller-identity --profile hdw-test --region ap-northeast-1
             # → "arn:aws:iam::088898720463:user/<NAME>" または
             #    "arn:aws:sts::088898720463:assumed-role/<ROLE>/<NAME>"

             # HDWNotifyLogReader の Trust Policy を取得し、Principal.AWS に上記 ARN を
             # 追加した JSON を作成。
             # (Trust Policy 例の差分):
             #   "Principal": {
             #     "AWS": [
             #       "arn:aws:iam::088898720463:role/hdw-notify-execution-role",
             #       "arn:aws:iam::088898720463:user/<NAME>"          ← 検証用に追加
             #     ]
             #   }
             aws iam update-assume-role-policy `
               --role-name HDWNotifyLogReader `
               --policy-document file://trust-policy-with-operator.json `
               --profile hanshin-t.kimura

        2. AssumeRole で一時クレデンシャルを取得:
             $resp = aws sts assume-role `
               --role-arn "arn:aws:iam::920373030024:role/HDWNotifyLogReader" `
               --role-session-name "hdw-notify-manual-verify" `
               --duration-seconds 900 `
               --profile hdw-test --region ap-northeast-1 | ConvertFrom-Json
             $env:AWS_ACCESS_KEY_ID     = $resp.Credentials.AccessKeyId
             $env:AWS_SECRET_ACCESS_KEY = $resp.Credentials.SecretAccessKey
             $env:AWS_SESSION_TOKEN     = $resp.Credentials.SessionToken
             $env:AWS_REGION            = "ap-northeast-1"

        3. 引き受けが成立していることを確認:
             aws sts get-caller-identity
             # 期待値: Account = "920373030024"、Arn が
             # arn:aws:sts::920373030024:assumed-role/HDWNotifyLogReader/hdw-notify-manual-verify

        4. Logs Insights クエリを発行 (LOG_GROUP_MAP の登録先と同じロググループに対して):
             $end   = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
             $start = $end - 3600
             $qid = aws logs start-query `
               --log-group-name "/aws/lambda/HDW_Backend_Processor_0001" `
               --start-time $start --end-time $end `
               --query-string "fields @timestamp, @message | sort @timestamp desc | limit 20" `
               --query 'queryId' --output text

             # ポーリング (Complete になるまで):
             do {
               Start-Sleep -Seconds 2
               $r = aws logs get-query-results --query-id $qid | ConvertFrom-Json
               Write-Host "status=$($r.status)"
             } while ($r.status -in @("Running","Scheduled"))

             $r.status    # ← "Complete" であること (AC-007-2)
             $r.results   # ← JSON 配列 (空配列でも可、rows > 0 は E2E (AC-006-3) で担保)

        5. 検証完了後の片付け (恒久変更を残さない):
             # 環境変数の tmp credentials を破棄:
             Remove-Item Env:AWS_ACCESS_KEY_ID, Env:AWS_SECRET_ACCESS_KEY, Env:AWS_SESSION_TOKEN
             # Trust Policy から追加した自社オペレータ ARN を除去し、元の Policy に戻す:
             aws iam update-assume-role-policy `
               --role-name HDWNotifyLogReader `
               --policy-document file://trust-policy-original.json `
               --profile hanshin-t.kimura

        本 TASK は新規コードを書かない。手順を docs/operations.md (または
        cross-account-architecture セクションの新規サブセクション) に転記し、
        構築フェーズと障害切り分けフェーズの両方から参照できるようにする。

        二段 AssumeRole (AC-007-1 (a)) を採用する場合の差分:
        - 上記 1 の代わりに、自社オペレータ IAM User の policy に
          "sts:AssumeRole → arn:aws:iam::088898720463:role/hdw-notify-execution-role" を
          一時付与し、まず execution-role を引き受け、その上で HDWNotifyLogReader を
          引き受ける。Trust Policy 改変が不要だが、自社側 IAM 権限の調整が必要。
        - 通常は (b) の方が手数が少なく検証完了後の原状回復も容易なため、PLAN は (b)
          を推奨ルートとして記述する。

    - id: "TASK-011"
      req: "REQ-003"
      title: "既存 ExternalId 関連アーティファクトの片付け (ops)"
      description: |
        SPEC v3.4.0 で ExternalId 不採用となったため、過去版に基づいて既に環境に
        投入されている ExternalId 関連アーティファクトを除去する。本 TASK は新規環境では
        no-op になり得る (既に投入が無ければ何もしない)。

        対象と手順:

        1. 自社アカウント (088898720463) Lambda の EXTERNAL_ID env var 除去:
             # 現状の env をスナップショット
             aws lambda get-function-configuration `
               --function-name HDW_Lambda_Notifier_0001 `
               --query 'Environment.Variables' `
               --profile hdw-test --region ap-northeast-1 `
               | Set-Content -Encoding utf8 tmp/lambda-env-snapshot.json

             # EXTERNAL_ID キーを除去した env で update-function-configuration を発行
             # (具体的な jq/PowerShell 操作は ops 実施者がスナップショットを見て確定)

        2. クライアントアカウント (920373030024) Trust Policy の sts:ExternalId 条件除去:
             # 現行 Trust Policy をスナップショット
             aws iam get-role --role-name HDWNotifyLogReader `
               --profile hanshin-t.kimura `
               --query 'Role.AssumeRolePolicyDocument' `
               | Set-Content -Encoding utf8 deploy/policy-backup-hdwnotifylogreader-trust-$(Get-Date -Format yyyyMMddHHmmss).json

             # TASK-002 に揃えた新 Trust Policy (StringEquals.sts:ExternalId なし) を適用
             aws iam update-assume-role-policy `
               --role-name HDWNotifyLogReader `
               --policy-document file://trust-policy-no-externalid.json `
               --profile hanshin-t.kimura

        3. GitHub Secret EXTERNAL_ID_HANSHIN の削除:
             gh secret delete EXTERNAL_ID_HANSHIN --env production
             gh secret delete EXTERNAL_ID_HANSHIN --env test
             # 環境名は実際の登録に合わせること

        4. ローカルの一時アーティファクト (deploy/.external-id-*.txt 等) があれば削除。
           .gitignore のエントリ自体は将来再導入を防ぐ意味は無いので、不要なら
           clean up commit で除く (本 TASK の必須範囲外)。

        確認:
        - Lambda env var 一覧に EXTERNAL_ID キーが存在しないこと。
        - Trust Policy の Condition ブロックが空、または sts:ExternalId を含まないこと。
        - GitHub Secrets に EXTERNAL_ID_HANSHIN が存在しないこと。
        - TASK-001〜010 完了後に手動 E2E (TC-006-1〜3) と単独検証 (TC-007-1) が
          パスすること (= ExternalId 除去によって退行が発生していない)。
